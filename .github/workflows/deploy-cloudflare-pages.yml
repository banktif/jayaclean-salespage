name: Deploy to CF Pages

on:
  push:
    branches: [master]
  workflow_dispatch: {}

concurrency:
  group: cf-pages-deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v6

      - uses: peaceiris/actions-hugo@v3
        with: { hugo-version: latest, extended: true }

      - run: npm install -g wrangler@4

      - name: Build Hugo
        working-directory: site
        run: hugo --minify --destination ../site-public

      - name: Deploy jayabina
        run: wrangler pages deploy site-public --project-name jayabina --branch main

      - name: Deploy admin
        run: |
          mkdir -p admin-public
          cp admin/index.html admin-public/index.html 2>/dev/null || true
          test -f admin/editor.html && cp admin/editor.html admin-public/ || true
          test -d admin/vendor && cp -r admin/vendor admin-public/ || true
          for f in theme.css admin-modern.css jc-api.js admin-favicon.svg admin-manifest.json; do test -f "$f" && cp "$f" admin-public/ || true; done
          wrangler pages deploy admin-public --project-name jayabina-admin --branch master

      - name: Deploy booking site (cuci.jayabina.com)
        run: |
          bash build.sh
          wrangler pages deploy public --project-name jayabina-pages --branch master
