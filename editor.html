<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex,nofollow">
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <title>JAYACLEAN — Sales Page Editor</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/grapesjs@0.21.13/dist/css/grapes.min.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:auto;font-family:system-ui,-apple-system,sans-serif;background:#1e1e1e}
    #gjs{height:calc(100% - 44px);width:100%}
    #gjs ::-webkit-scrollbar{width:10px;height:10px}
    #gjs ::-webkit-scrollbar-thumb{background:#4a4a4a;border-radius:6px}
    #gjs ::-webkit-scrollbar-track{background:#1e1e1e}
    .gjs-cv-canvas{overflow:auto!important;padding-bottom:20px!important;background-color:#f0f0f0!important}
    .gjs-frame{max-width:none!important}
    /* PASSWORD GATE */
    #pwGate{position:fixed;inset:0;z-index:99999;background:#1a1a1a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px}
    #pwGate input{padding:14px 20px;border:2px solid #3a3a3a;border-radius:12px;background:#252525;color:#fff;font-size:1rem;width:280px;text-align:center;font-family:inherit;outline:none}
    #pwGate input:focus{border-color:#166534}
    #pwGate button{padding:14px 40px;background:#166534;color:#fff;border:none;border-radius:12px;font-size:1rem;font-weight:600;cursor:pointer;font-family:inherit}
    #pwGate h2{color:#fff;font-size:1.4rem}#pwGate .sub{color:#888;font-size:.8rem}#pwGate .err{color:#e5484d;font-size:.8rem;display:none}
    #pwGate.hidden{display:none}
    /* PAT MODAL */
    #patModal{position:fixed;inset:0;z-index:10000;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center}
    #patModal.show{display:flex}
    #patModal .box{background:#2d2d2d;border-radius:16px;padding:24px;width:460px;max-width:90vw}
    #patModal h3{color:#fff;font-size:1.05rem;margin-bottom:14px}
    #patModal input{padding:10px 12px;border-radius:8px;border:1px solid #3a3a3a;background:#252525;color:#e0e0e0;font-size:.82rem;font-family:inherit;width:100%}
    #patModal input:focus{border-color:#166534;outline:none}
    #patModal .r{display:flex;gap:8px;margin-top:12px}
    /* TOP BAR */
    #topbar{display:none;align-items:center;gap:10px;padding:7px 12px;background:#2d2d2d;border-bottom:1px solid #3a3a3a;position:relative}
    #topbar .brand{color:#4ade80;font-weight:800;font-size:.85rem;letter-spacing:.3px}
    #topbar .lock{font-size:.66rem;color:#888;background:#1e1e1e;border:1px solid #333;padding:3px 9px;border-radius:20px}
    #topbar button{font-family:inherit;padding:6px 14px;border-radius:6px;border:1px solid #3a3a3a;background:#252525;color:#e0e0e0;font-size:.72rem;cursor:pointer;font-weight:600}
    #topbar button.prim{background:#166534;color:#fff;border:none}#topbar button.prim:hover{background:#14532d}
    #topbar button.prim:disabled{opacity:.5;cursor:not-allowed}
    #topbar .sep{width:1px;height:20px;background:#3a3a3a}
    #topbar .info{font-size:.68rem;color:#888;margin-left:auto}
    .toast{position:fixed;bottom:24px;right:24px;padding:14px 24px;border-radius:10px;z-index:99999;font-weight:600;font-size:.85rem;opacity:0;transition:opacity .3s;pointer-events:none}
    .toast.ok{background:#166534;color:#fff}.toast.err{background:#c62828;color:#fff}.toast.show{opacity:1}
    .gjs-one-bg{background:#1e1e1e!important}.gjs-two-color{color:#4ade80!important}
    .gjs-three-bg{background:#2d2d2d!important;color:#e0e0e0!important}
    .gjs-four-color,.gjs-four-color-h:hover{color:#4ade80!important}
    .gjs-pn-panels,.gjs-pn-commands,.gjs-pn-options{background:#2d2d2d!important;border-bottom:1px solid #3a3a3a!important}
    .gjs-pn-panel,.gjs-pn-buttons{background:#1e1e1e!important}
    .gjs-pn-btn{border:none!important;color:#b0b0b0!important;background:transparent!important;border-radius:4px!important}
    .gjs-pn-btn:hover{background:#3a3a3a!important;color:#e0e0e0!important}
    .gjs-pn-btn.gjs-pn-active{background:#166534!important;color:#fff!important}
    .gjs-blocks-c{background:#1e1e1e!important;padding:10px!important}
    .gjs-block{background:#2d2d2d!important;border:1px solid #3a3a3a!important;color:#ccc!important;border-radius:6px!important}
    .gjs-block:hover{background:#3a3a3a!important;border-color:#166534!important}
    .gjs-sm-sector{background:#1e1e1e!important}.gjs-sm-header,.gjs-sm-sector .gjs-sm-title{background:#2d2d2d!important;color:#ccc!important}
    .gjs-sm-field input,.gjs-sm-field select{background:#252525!important;border:1px solid #3a3a3a!important;color:#e0e0e0!important}
    .gjs-layer:hover{background:#2d2d2d!important}.gjs-layer.gjs-selected{background:#3a3a3a!important}
    .gjs-trt-traits{background:#1e1e1e!important}
  </style>
</head>
<body>

<!-- PASSWORD GATE -->
<div id="pwGate">
  <h2>&#128274; Sales Page Editor</h2>
  <p class="sub" id="pwSub">Enter password to continue</p>
  <input type="password" id="pwInput" placeholder="Password" onkeydown="if(event.key==='Enter')checkPassword()">
  <div class="err" id="pwErr">Wrong password</div>
  <button onclick="checkPassword()">Unlock</button>
</div>

<!-- PAT MODAL -->
<div id="patModal" onclick="if(event.target===this)document.getElementById('patModal').classList.remove('show')">
  <div class="box">
    <h3>GitHub Token (to save)</h3>
    <input type="password" id="patInput" placeholder="ghp_...">
    <div style="color:#666;font-size:.65rem;margin-top:6px">Needs <b>repo</b> scope. Saved locally in this browser only. <a href="https://github.com/settings/tokens/new" target="_blank" style="color:#4ade80">Create token</a></div>
    <div class="r"><button onclick="savePAT()" style="flex:1;background:#166534;color:#fff;border:none;padding:10px;border-radius:8px;font-weight:600;cursor:pointer">Save</button><button onclick="document.getElementById('patModal').classList.remove('show')" style="flex:1;background:#555;color:#fff;border:none;padding:10px;border-radius:8px;cursor:pointer">Close</button></div>
  </div>
</div>

<!-- TOP BAR (locked to Sales Page) -->
<div id="topbar">
  <span class="brand">JAYACLEAN</span>
  <span class="lock">&#128274; LOCKED: Sales Page only (index.html)</span>
  <span class="sep"></span>
  <button onclick="loadSite()" class="prim">Load Sales Page</button>
  <button onclick="saveToGitHub()" id="saveBtn" class="prim" disabled>Save</button>
  <span class="sep"></span>
  <button onclick="document.getElementById('patInput').value=pat;document.getElementById('patModal').classList.add('show')">&#128273; Token</button>
  <button onclick="doLogout()">Logout</button>
  <span class="info" id="siteInfo"></span>
</div>

<div id="gjs"></div>
<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/grapesjs@0.21.13/dist/grapes.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/grapesjs-preset-webpage@1.0.3/dist/index.min.js"></script>
<script>
// ============================================================
// LOCKED TARGET — this editor can ONLY edit the sales page.
// It can never touch admin/worker/customer or any other repo/file.
// ============================================================
var SITE=Object.freeze({name:'Sales Page',repo:'banktif/jayaclean-salespage',file:'index.html',branch:'master'});

if(!grapesjs||!grapesjs.plugins){alert('GrapesJS failed to load. Check internet connection.')}
var editor=null,pat='',currentHTML='',PASSWORD_HASH='';

function toast(m,ok){var t=document.getElementById('toast');if(!t){alert(m);return}t.textContent=m;t.className='toast '+(ok?'ok':'err')+' show';setTimeout(function(){if(t)t.className='toast'},3000)}
function esc(s){return(s||'').toString().replace(/[<>&"]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]})}
function hashPw(s){var t='JBED'+s+'salespage',h='';for(var i=0;i<t.length;i++)h+=((t.charCodeAt(i)*7)%16).toString(16);return h}

function checkPassword(){
  var v=document.getElementById('pwInput').value;if(!v)return;
  if(!PASSWORD_HASH){PASSWORD_HASH=hashPw(v);localStorage.setItem('editor_pw_hash',PASSWORD_HASH);unlockEditor();return}
  if(hashPw(v)===PASSWORD_HASH){unlockEditor()}else{document.getElementById('pwErr').style.display='block'}
}
function unlockEditor(){
  document.getElementById('pwGate').classList.add('hidden');
  document.getElementById('topbar').style.display='flex';
  localStorage.setItem('editor_unlock_time',Date.now());
  document.getElementById('siteInfo').textContent=SITE.repo+'/'+SITE.file;
}
function doLogout(){document.getElementById('pwGate').classList.remove('hidden');document.getElementById('topbar').style.display='none';if(editor){editor.destroy();editor=null}document.getElementById('gjs').innerHTML='';document.getElementById('pwInput').value='';document.getElementById('pwErr').style.display='none';localStorage.removeItem('editor_unlock_time')}
function savePAT(){pat=document.getElementById('patInput').value.trim();localStorage.setItem('gh_pat',pat);document.getElementById('patModal').classList.remove('show');toast('Token saved',true)}

function initEditor(){
  PASSWORD_HASH=localStorage.getItem('editor_pw_hash')||'';
  pat=localStorage.getItem('gh_pat')||'';
  if(!PASSWORD_HASH){document.getElementById('pwSub').textContent='Set a password to protect this editor'}
  else{var last=parseInt(localStorage.getItem('editor_unlock_time')||'0');if(Date.now()-last<43200000)unlockEditor()}
}

async function loadSite(){
  var info=document.getElementById('siteInfo');info.textContent='Loading...';
  var url='https://raw.githubusercontent.com/'+SITE.repo+'/'+SITE.branch+'/'+SITE.file+'?t='+Date.now();
  try{
    var r=await fetch(url);if(!r.ok)throw new Error('HTTP '+r.status);
    currentHTML=await r.text();
    info.textContent=SITE.repo+'/'+SITE.file;
    document.getElementById('saveBtn').disabled=false;
    buildEditor(currentHTML);
  }catch(e){toast('Load failed: '+e.message,false);info.textContent='Error'}
}

function buildEditor(html){
  if(editor){editor.destroy();document.getElementById('gjs').innerHTML=''}
  var bodyM=html.match(/<body[^>]*>([\s\S]*?)<\/body>/i);var bodyHTML=bodyM?bodyM[1]:html;
  var styleM=html.match(/<style[^>]*>([\s\S]*?)<\/style>/i);var styleCSS=styleM?styleM[1]:'';
  editor=grapesjs.init({
    container:'#gjs',height:'100%',width:'auto',fromElement:false,
    storageManager:{type:'local',autosave:false,stepsBeforeSave:1},
    plugins:['gjs-preset-webpage'],pluginsOpts:{'gjs-preset-webpage':{}},
    canvas:{styles:['https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap']},
    deviceManager:{devices:[{name:'Desktop',width:''},{name:'Tablet',width:'768px',widthMedia:'768px'},{name:'Mobile',width:'375px',widthMedia:'375px'}]},
    showOffsets:true,showStylesOnChange:true,clearOnRender:true
  });
  editor.on('load',function(){
    if(styleCSS)editor.setStyle(styleCSS);
    editor.addComponents(bodyHTML);
    var bm=editor.Blocks;
    bm.add('hero',{label:'★ Hero',category:'Extra',content:'<section style="padding:100px 0;text-align:center;background:#f0fdf4"><div style="max-width:1100px;margin:0 auto;padding:0 20px"><h1 style="font-size:3rem;font-weight:800;margin-bottom:16px">Hero Title</h1><p style="font-size:1.2rem;color:#666;margin-bottom:24px">Hero subtitle</p><a href="#" style="display:inline-block;padding:16px 36px;background:#166534;color:#fff;border-radius:50px;text-decoration:none;font-weight:700">Get Started</a></div></section>'});
    bm.add('grid3',{label:'⊟ 3 Cols',category:'Extra',content:'<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:24px"><div style="text-align:center;padding:20px"><h3>Feature 1</h3><p>Description</p></div><div style="text-align:center;padding:20px"><h3>Feature 2</h3><p>Description</p></div><div style="text-align:center;padding:20px"><h3>Feature 3</h3><p>Description</p></div></div>'});
    bm.add('cta',{label:'📢 CTA',category:'Extra',content:'<section style="background:#166534;color:#fff;text-align:center;padding:60px 20px;border-radius:16px"><h2 style="font-size:2rem;margin-bottom:12px">Ready to start?</h2><a href="#" style="display:inline-block;padding:16px 36px;background:#fff;color:#166534;border-radius:50px;text-decoration:none;font-weight:700">Get Started</a></section>'});
    bm.add('faq',{label:'? FAQ',category:'Extra',content:'<div style="max-width:600px"><div style="border-bottom:1px solid #ddd;padding:16px 0"><div style="font-weight:700">Question 1?</div><p style="margin-top:8px;color:#666">Answer.</p></div></div>'});
  });
  window.editor=editor;
  document.onkeydown=function(e){if((e.ctrlKey||e.metaKey)&&e.key==='s'){e.preventDefault();saveToGitHub()}}
}

async function saveToGitHub(){
  if(!editor){toast('Load the page first',false);return}
  if(!pat){toast('Set GitHub token first (🔑 Token)',false);document.getElementById('patModal').classList.add('show');return}
  // HARD LOCK: always sales page, never anything else
  var repo=SITE.repo,file=SITE.file,branch=SITE.branch;
  if(repo!=='banktif/jayaclean-salespage'||file!=='index.html'){toast('Locked to sales page only.',false);return}
  var html=editor.getHtml(),css=editor.getCss();
  var headM=currentHTML.match(/<head[^>]*>([\s\S]*?)<\/head>/i);var headContent=headM?headM[1]:'';
  var scripts=(currentHTML.match(/<script[\s\S]*?<\/script>/gi)||[]).join('\n');
  headContent=headContent.replace(/<style[^>]*>[\s\S]*?<\/style>/gi,'').replace(/<script[\s\S]*?<\/script>/gi,'');
  var htmlAM=currentHTML.match(/<html([^>]*)>/i);var htmlAttrs=htmlAM?htmlAM[1]:' lang="ms"';
  // Preserve original <script> tags (booking/Supabase logic) so functionality is not lost
  var fullHTML='<!DOCTYPE html>\n<html'+htmlAttrs+'>\n<head>\n'+headContent.trim()+'\n  <style>\n'+css+'\n  </style>\n</head>\n<body>\n'+html+'\n'+scripts+'\n</body>\n</html>';
  var apiUrl='https://api.github.com/repos/'+repo+'/contents/'+file;
  try{
    var getRes=await fetch(apiUrl,{headers:{Authorization:'Bearer '+pat}});
    var getData=await getRes.json();
    if(!getData.sha)throw new Error(getData.message||'Cannot read file');
    var content=btoa(unescape(encodeURIComponent(fullHTML)));
    var putRes=await fetch(apiUrl,{method:'PUT',headers:{Authorization:'Bearer '+pat,'Content-Type':'application/json'},body:JSON.stringify({message:'Update sales page via GrapesJS',content:content,sha:getData.sha,branch:branch})});
    if(!putRes.ok){var err=await putRes.json();throw new Error(err.message||'HTTP '+putRes.status)}
    currentHTML=fullHTML;toast('Saved! Sales page deploying...',true);
  }catch(e){toast('Save failed: '+e.message,false)}
}

initEditor();
</script>
</body>
</html>
