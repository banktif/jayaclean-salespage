<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GrapesJS Editor — Jaya Bina Services</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/grapesjs@0.21.13/dist/css/grapes.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{height:100%;overflow:hidden}
    #gjs{height:100%;width:100%}
    .gjs-one-bg{background:#2E7D32}
    .gjs-two-color{color:#2E7D32}
    .gjs-three-bg{background:#1B5E20;color:#fff}
    .gjs-four-color,.gjs-four-color-h:hover{color:#FFC107}
    .loading-overlay{position:fixed;inset:0;z-index:9999;background:#1a1a1a;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;transition:opacity .4s}
    .loading-overlay.hidden{opacity:0;pointer-events:none}
    .loading-overlay h2{color:#4CAF50;font-size:1.5rem}
    .loading-overlay p{color:#888}
    .spinner{width:40px;height:40px;border:3px solid #333;border-top-color:#4CAF50;border-radius:50%;animation:spin .8s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    .export-toast{position:fixed;bottom:24px;right:24px;background:#2E7D32;color:#fff;padding:14px 24px;border-radius:10px;z-index:999;font-weight:600;font-size:.9rem;box-shadow:0 4px 20px rgba(46,125,50,.4);opacity:0;transition:opacity .3s}
    .export-toast.show{opacity:1}
  </style>
</head>
<body>
  <div class="loading-overlay" id="loader">
    <div class="spinner"></div>
    <h2>Loading Editor...</h2>
    <p>Fetching sales page + GrapesJS engine</p>
  </div>
  <div id="gjs"></div>
  <div class="export-toast" id="toast">✅ HTML Downloaded — copy to replace index.html</div>

  <script src="https://cdn.jsdelivr.net/npm/grapesjs@0.21.13/dist/grapes.min.js">
  </script>
  <script src="https://cdn.jsdelivr.net/npm/grapesjs-preset-webpage@1.0.3/dist/grapesjs-preset-webpage.min.js">
  </script>
  <script>
  (async function(){

  // FETCH SALES PAGE
  var htmlContent = '';
  try {
    var resp = await fetch('index.html');
    htmlContent = await resp.text();
  } catch(e){
    console.warn('Cannot fetch index.html, using fallback');
    htmlContent = '<section><div class="container"><h2>Jaya Bina Services</h2><p>Sales page loading failed. Open index.html directly.</p></div></section>';
  }

  // Extract body content
  var bodyMatch = htmlContent.match(/<body[^>]*>([\s\S]*)<\/body>/i);
  var bodyHTML = bodyMatch ? bodyMatch[1] : htmlContent;

  // Extract style
  var styleMatch = htmlContent.match(/<style[^>]*>([\s\S]*)<\/style>/i);
  var styleCSS = styleMatch ? styleMatch[1] : '';

  // INIT EDITOR
  var editor = grapesjs.init({
    container: '#gjs',
    height: '100%',
    width: 'auto',
    storageManager: false,
    plugins: ['gjs-preset-webpage'],
    pluginsOpts: {
      'gjs-preset-webpage': {
        modalImportTitle: 'Import HTML',
        modalImportLabel: '',
        modalImportContent: function(editor){ return editor.getHtml() + '<style>'+editor.getCss()+'</style>' },
        navbarOpts: true,
        countdownOpts: true,
        formsOpts: true,
        exportOpts: true,
        blocksBasicOpts: {
          blocks: ['column1','column2','column3','column3-7','text','link','image','video','map']
        },
      }
    },
    canvas: {
      styles: [
        'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap'
      ]
    },
    deviceManager: {
      devices: [
        { name: 'Desktop', width: '' },
        { name: 'Tablet', width: '768px', widthMedia: '768px' },
        { name: 'Mobile', width: '375px', widthMedia: '375px' }
      ]
    }
  });

  // Inject CSS into canvas
  editor.on('load', function(){
    if(styleCSS){
      editor.setStyle(styleCSS);
    }
  });

  // Load the body HTML
  editor.addComponents(bodyHTML);

  // HIDE LOADER
  setTimeout(function(){
    document.getElementById('loader').classList.add('hidden');
  }, 800);

  // CUSTOM EXPORT BUTTON in top panel
  editor.Panels.addButton('options', {
    id: 'export-html-btn',
    className: 'fa fa-download',
    command: 'export-full-html',
    attributes: { title: 'Download Full HTML' }
  });

  editor.Commands.add('export-full-html', {
    run: function(ed, sender){
      var html = ed.getHtml();
      var css = ed.getCss();

      // Extract meta + title from original
      var metaMatch = htmlContent.match(/<head[^>]*>([\s\S]*)<\/head>/i);
      var headContent = metaMatch ? metaMatch[1] : '';
      // Remove original style
      headContent = headContent.replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '');
      // Remove original script tags
      headContent = headContent.replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '');

      var fullHTML = '<!DOCTYPE html>\n<html lang="ms">\n<head>\n' + headContent.trim() + '\n  <style>\n' + css + '\n  </style>\n</head>\n<body>\n' + html + '\n</body>\n</html>';

      var blob = new Blob([fullHTML], {type:'text/html'});
      var a = document.createElement('a');
      a.href = URL.createObjectURL(blob);
      a.download = 'index-edited.html';
      a.click();
      URL.revokeObjectURL(a.href);

      // Toast
      var toast = document.getElementById('toast');
      toast.classList.add('show');
      setTimeout(function(){ toast.classList.remove('show'); }, 3000);
    }
  });

  // KEYBOARD SHORTCUT: Ctrl+S to export
  document.addEventListener('keydown', function(e){
    if((e.ctrlKey || e.metaKey) && e.key === 's'){
      e.preventDefault();
      editor.runCommand('export-full-html');
    }
  });

  // Expose for console
  window.editor = editor;

  })();
  </script>
</body>
</html>
