<!DOCTYPE html>
<html lang="ms">
<head>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <meta name="theme-color" content="#166534">
  <title>JAYACLEAN — My Bookings</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent}
    .wrap{max-width:520px;margin:0 auto;padding:20px 16px 60px}
    .logo{width:56px;height:56px;border-radius:18px;background:linear-gradient(135deg,var(--accent),#16a34a);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1.3rem;margin:0 auto 12px;box-shadow:0 6px 20px var(--accent-glow)}
    h1{text-align:center;font-size:1.2rem;font-weight:800;letter-spacing:-.3px;margin-bottom:4px}
    .sub{text-align:center;font-size:.78rem;color:var(--text3);margin-bottom:24px}
    input{padding:14px 16px;border:2px solid var(--border-strong);border-radius:14px;font-family:var(--font);font-size:.9rem;width:100%;background:var(--elevated);color:var(--text);outline:none;transition:border .2s;margin-bottom:10px}
    input:focus{border-color:var(--accent)}
    .btn{display:block;width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-weight:700;font-size:.9rem;cursor:pointer;font-family:var(--font);box-shadow:0 4px 12px var(--accent-glow);transition:all .2s}
    .btn:active{transform:scale(.97)}.btn:disabled{opacity:.5}
    .btn.out{background:var(--elevated);color:var(--text);border:1px solid var(--border-strong);box-shadow:none}
    .card{background:var(--elevated);border:1px solid var(--border);border-radius:16px;padding:16px;margin-bottom:10px;box-shadow:var(--shadow);cursor:pointer;transition:all .15s}
    .card:active{border-color:var(--accent)}
    .row{display:flex;align-items:center;justify-content:space-between;gap:10px}
    .cname{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cdate{font-size:.7rem;color:var(--text2);background:var(--bg);padding:3px 10px;border-radius:20px;white-space:nowrap;font-weight:600}
    .caddr{font-size:.72rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:4px}
    .badge{display:inline-flex;align-items:center;gap:4px;padding:4px 10px;border-radius:20px;font-size:.62rem;font-weight:600;white-space:nowrap}
    .badge .bd{width:6px;height:6px;border-radius:50%;background:currentColor}
    .badge.pending{background:var(--warning-light);color:var(--warning)}
    .badge.confirmed{background:var(--accent-light);color:var(--accent)}
    .badge.completed{background:var(--accent2-light);color:var(--accent2)}
    .badge.cancelled{background:var(--danger-light);color:var(--danger)}
    .detail{background:var(--elevated);border:1px solid var(--border);border-radius:16px;padding:18px;margin-bottom:12px;box-shadow:var(--shadow)}
    .dr{display:flex;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border);font-size:.8rem}.dr:last-child{border:none}
    .dr .k{color:var(--text3)}.dr .v{font-weight:600;text-align:right;max-width:60%}
    .thumbs{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-top:6px}
    .thumb{border-radius:10px;overflow:hidden;background:var(--bg);aspect-ratio:1}
    .thumb img{width:100%;height:100%;object-fit:cover}
    .empty{text-align:center;padding:40px 20px;color:var(--text3)}.empty .ei{font-size:2.2rem;margin-bottom:8px}
    .spin{display:flex;justify-content:center;padding:48px;gap:6px}.sd{width:6px;height:6px;border-radius:50%;background:var(--accent);animation:sp 1.4s infinite}.sd:nth-child(2){animation-delay:.2s}.sd:nth-child(3){animation-delay:.4s}@keyframes sp{0%,80%,100%{opacity:.2}40%{opacity:1}}
    .err{color:var(--danger);font-size:.75rem;text-align:center;margin-top:6px;display:none}
    .back{display:flex;align-items:center;gap:6px;color:var(--accent);font-weight:600;font-size:.78rem;cursor:pointer;margin-bottom:14px;background:none;border:none;font-family:var(--font)}
    .hdr{text-align:center;padding:10px 0 4px;font-size:.7rem;color:var(--text3);font-weight:600;letter-spacing:.6px;text-transform:uppercase}
    .tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none}
    .tab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid transparent;background:var(--accent-light);color:var(--text2);font-size:.72rem;font-weight:600;cursor:pointer;font-family:var(--font)}
    .tab.active{background:var(--accent);color:#fff}
    .ph-display{font-size:.82rem;color:var(--accent);font-weight:600;text-align:center;margin-bottom:4px}
    .logoff{display:block;width:100%;padding:10px;text-align:center;color:var(--danger);font-weight:600;font-size:.75rem;cursor:pointer;margin-top:10px;font-family:var(--font)}
  </style>
</head>
<body>
<div class="wrap">
  <!-- LOGIN SCREEN -->
  <div id="loginScreen">
    <div class="logo">JC</div>
    <h1>JAYACLEAN</h1>
    <p class="sub">Customer Portal — View your bookings</p>
    <input type="tel" id="phoneInput" placeholder="Phone number (e.g. 0123456789)" maxlength="13">
    <div class="err" id="errPhone">Please enter a valid phone number</div>
    <button class="btn" onclick="login()">View My Bookings</button>
  </div>

  <!-- BOOKINGS LIST -->
  <div id="listScreen" style="display:none">
    <div class="ph-display" id="phoneDisplay"></div>
    <div class="tabs" id="tabs">
      <button class="tab active" data-f="all" onclick="filterTab('all')">All</button>
      <button class="tab" data-f="active" onclick="filterTab('active')">Active</button>
      <button class="tab" data-f="completed" onclick="filterTab('completed')">Done</button>
    </div>
    <div id="bookingsList"></div>
    <div class="logoff" onclick="logout()">Switch account</div>
  </div>

  <!-- BOOKING DETAIL -->
  <div id="detailScreen" style="display:none">
    <button class="back" onclick="backToList()">← Back</button>
    <div id="detailContent"></div>
  </div>
</div>

<script src="/jc-api.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
<script>
var API_URL=localStorage.getItem('jc_api_url')||'https://api.jayabina.com';
var SB=JCApi.create(API_URL);
var _lt;function relucide(){clearTimeout(_lt);_lt=setTimeout(function(){try{if(window.lucide)lucide.createIcons()}catch(e){}},30);}
var _mo=new MutationObserver(relucide);_mo.observe(document.body,{childList:true,subtree:true});
var myPhone='',myBookings=[],myTasks=[],filter='all',selId=null;
var BC_BALANCE_FN=API_URL+'/api/payments/create-balance-intent';

function esc(s){return(s||'').toString().replace(/[<>&"]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]})}
function fd(d){if(!d)return'-';var p=d.split('-');return p[2]+'/'+p[1]+'/'+p[0]}
function ft(t){return t?t.replace('am',':00 AM').replace('pm',':00 PM').replace(/^(\d):/,'0$1:'):t}
function waNum(p){p=(p||'').replace(/[^0-9]/g,'');if(p.indexOf('0')===0)p='6'+p.substring(1);return p}
function show(id){document.querySelectorAll('#loginScreen,#listScreen,#detailScreen').forEach(function(x){x.style.display='none'});document.getElementById(id).style.display='block'}
function bdg(s){var m={pending_payment:'Awaiting Payment',confirmed:'Confirmed',completed:'Completed',cancelled:'Cancelled'};return'<span class="badge '+s+'"><span class="bd"></span>'+(m[s]||s)+'</span>'}

async function login(){
  var raw=document.getElementById('phoneInput').value.trim();
  if(!raw||!/^0[0-9]{8,10}$/.test(raw)){document.getElementById('errPhone').style.display='block';return}
  document.getElementById('errPhone').style.display='none';
  myPhone=raw;
  document.getElementById('phoneDisplay').textContent=raw;
  await loadMyBookings();
  show('listScreen');
  renderList();
}

async function loadMyBookings(){
  try{
    var resp=await SB.from('bookings').select('*').eq('customer_phone',myPhone).order('booking_date',{ascending:false}).order('booking_time',{ascending:false});
    var data=resp.data||[];
    myBookings=data.filter(function(b){return b.customer_phone&&b.customer_phone.replace(/\D/g,'')===myPhone});
    var ids=myBookings.map(function(b){return b.id});
    myTasks={};
    if(ids.length){
      for(var i=0;i<ids.length;i++){try{var tr=await SB.from('tasks').select('*').eq('booking_id',ids[i]);if(tr.data){var tsk=Array.isArray(tr.data)?tr.data[0]:tr.data;if(tsk)myTasks[tsk.booking_id]=tsk}}catch(e){}}
    }
  }catch(e){myBookings=[];myTasks={}}
}

function filterTab(f){filter=f;document.querySelectorAll('.tab').forEach(function(t){t.classList.toggle('active',t.getAttribute('data-f')===f)});renderList()}
function renderList(){
  var list=myBookings.slice();
  if(filter==='active')list=list.filter(function(b){return b.status==='pending_payment'||b.status==='confirmed'});
  else if(filter==='completed')list=list.filter(function(b){return b.status==='completed'});
  var el=document.getElementById('bookingsList');
  if(!list.length){el.innerHTML='<div class="empty"><div class="ei"><i data-lucide="inbox"></i></div><p>No bookings found.</p></div>';relucide();return}
  var h='';
  list.forEach(function(b){
    var t=myTasks[b.booking_id];
    var tBadge=t?'<span class="badge '+(t.status==='completed'?'completed':'confirmed')+'"><span class="bd"></span>'+(t.status==='completed'?'Done':t.status.replace('_',' '))+'</span>':'';
    h+='<div class="card" onclick="openDetail(\''+b.id+'\')"><div class="row"><div><div class="cname">'+esc(b.customer_name)+'</div><div class="caddr">'+esc(b.customer_address)+'</div></div><span class="cdate">'+fd(b.booking_date)+'<br>'+ft(b.booking_time)+'</span></div><div class="row" style="margin-top:8px">'+bdg(b.status)+tBadge+'</div></div>';
  });
  el.innerHTML=h;relucide();
}

async function openDetail(id){
  selId=id;
  var b=myBookings.find(function(x){return x.id===id});if(!b)return;
  var t=myTasks[id];
  show('detailScreen');

  // Load photos
  var photos=[];
  if(t){try{var pr=await SB.from('task_photos').select('*').eq('task_id',t.id).order('created_at',{ascending:true});photos=pr.data||[];}catch(e){}}
  var beforeP=photos.filter(function(p){return p.type==='before'});
  var afterP=photos.filter(function(p){return p.type==='after'});
  function thumbs(arr){if(!arr.length)return'';var s='<div class="thumbs">';arr.forEach(function(p){s+='<div class="thumb"><a href="'+esc(p.url)+'" target="_blank"><img src="'+esc(p.url)+'" loading="lazy"></a></div>'});return s+'</div>'}

  var h='<div class="detail"><h2 style="font-size:1rem;font-weight:700;margin-bottom:14px">'+esc(b.customer_name)+'</h2>';
  h+='<div class="dr"><span class="k">Date &amp; Time</span><span class="v">'+fd(b.booking_date)+' &middot; '+ft(b.booking_time)+'</span></div>';
  h+='<div class="dr"><span class="k">Address</span><span class="v">'+esc(b.customer_address)+'</span></div>';
  h+='<div class="dr"><span class="k">Status</span><span class="v">'+bdg(b.status)+'</span></div>';
  if(t)h+='<div class="dr"><span class="k">Job Status</span><span class="v">'+esc(t.status.replace(/_/g,' '))+'</span></div>';
  h+='<div class="dr"><span class="k">Deposit</span><span class="v">RM'+esc(b.deposit_amount)+' &middot; '+(b.payment_status==='paid'?'Paid':'Pending')+'</span></div>';
  h+='<div class="dr"><span class="k">Balance</span><span class="v">RM150 '+(b.status==='completed'?'(Due)':'')+'</span></div>';
  h+='<div class="dr"><span class="k">Ref</span><span class="v" style="font-size:.65rem;opacity:.6">#'+b.id.substring(0,8)+'</span></div>';
  h+='</div>';

  if(beforeP.length){h+='<div class="detail"><div style="font-weight:700;margin-bottom:8px;font-size:.8rem">Before Photos ('+beforeP.length+')</div>'+thumbs(beforeP)+'</div>'}
  if(afterP.length){h+='<div class="detail"><div style="font-weight:700;margin-bottom:8px;font-size:.8rem">After Photos ('+afterP.length+')</div>'+thumbs(afterP)+'</div>'}

  // ACTIONS
  h+='<div style="display:flex;gap:8px;flex-wrap:wrap;margin-top:12px">';
  h+='<button class="btn" style="flex:1;min-width:140px;background:#25D366" onclick="window.open(\'https://wa.me/'+waNum(myPhone)+'?text=Salam JAYACLEAN, booking ref '+b.id.substring(0,8)+'\',\'_blank\')">WhatsApp Support</button>';

  // Pay balance button
  if(b.status==='completed'&&b.payment_status==='paid'){
    h+='<button class="btn" style="flex:1;min-width:140px" id="payBalanceBtn" onclick="payBalance(\''+b.id+'\')">Pay Balance RM150</button>';
  }

  // Cancel button (only if not yet completed/cancelled)
  if(b.status!=='completed'&&b.status!=='cancelled'){
    h+='<button class="btn out" style="flex:1;min-width:140px;color:var(--danger)" onclick="cancelBooking(\''+b.id+'\')">Cancel Booking</button>';
  }
  h+='</div>';

  document.getElementById('detailContent').innerHTML=h;relucide();
}

async function payBalance(bid){
  var btn=document.getElementById('payBalanceBtn');if(!btn)return;
  btn.disabled=true;btn.textContent='Creating payment...';
  try{
    var res=await fetch(BC_BALANCE_FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({booking_id:bid,origin:location.origin})});
    var data=await res.json();
    if(data.url){location.href=data.url;return}
    throw new Error(data.error||'Payment failed');
  }catch(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Pay Balance RM150'}
}

function backToList(){show('listScreen');renderList();relucide()}
function logout(){myPhone='';myBookings=[];myTasks={};selId=null;show('loginScreen');document.getElementById('phoneInput').value='';relucide()}
relucide();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){})}
</script>
</body>
</html>
