<!DOCTYPE html>
<html lang="ms" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#f5f7f5">
  <link rel="manifest" href="/manifest.json">
  <title>JAYABINA — Admin</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    html,body{overflow-x:hidden;scrollbar-width:none;-ms-overflow-style:none}
    html::-webkit-scrollbar,body::-webkit-scrollbar{display:none}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;-webkit-tap-highlight-color:transparent;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s}
    ::selection{background:var(--accent);color:#fff}

    /* ═══════════ MOBILE ═══════════ */
    @media(max-width:1023px){
      body{padding:60px 0 80px 0;overflow-x:hidden}
      .hdr{position:fixed;top:0;left:0;right:0;z-index:50;background:var(--overlay);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-bottom:1px solid var(--border);height:56px;padding:0 16px;display:flex!important;align-items:center;justify-content:space-between;width:100%}
      .hdr-l{display:flex;align-items:center;gap:8px;width:auto}
      .bnav{display:flex}.d-hdr,.d-sidebar,.d-only,.mnav{display:none}
    }
    .hdr{display:none}
    .hdr-l{display:flex;align-items:center;gap:10px;flex:1}
    .hdr-logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(135deg,var(--accent),#16a34a);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.8rem;letter-spacing:-.3px;box-shadow:0 4px 12px var(--accent-glow);flex-shrink:0}
    .hdr-title h1{font-size:1.35rem;font-weight:800;letter-spacing:-.6px;line-height:36px;text-align:left}
    .hdr-title span{font-size:.6rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
    .hdr-r{display:flex;gap:6px;flex-shrink:0}
    .hdr-btn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border-strong);background:var(--elevated);color:var(--text2);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:1rem;transition:all .2s;box-shadow:0 1px 2px rgba(0,0,0,.03)}
    .hdr-btn:active{transform:scale(.93);background:var(--border)}

    /* ═══════════ DESKTOP LAYOUT ═══════════ */
    @media(min-width:1024px){
      body{display:flex;min-height:100vh;padding:0}
      .d-sidebar{display:flex;flex-direction:column;width:260px;min-width:260px;background:var(--elevated);border-right:1px solid var(--border);padding:24px 16px;position:fixed;top:0;left:0;bottom:0;z-index:60;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none}
      .d-sidebar::-webkit-scrollbar{width:0!important;height:0!important;display:none!important}
      .hdr,.bnav,.drawer,.drawer-overlay,.mnav{display:none!important}
      .d-brand{display:flex;align-items:center;gap:12px;padding:0 8px 24px;border-bottom:1px solid var(--border);margin-bottom:20px}
      .d-brand .hdr-logo{width:44px;height:44px;border-radius:16px;font-size:.95rem}
      .d-brand-text h1{font-size:1.05rem;font-weight:700;letter-spacing:-.3px;line-height:1.2}
      .d-brand-text span{font-size:.64rem;color:var(--text3);font-weight:600;text-transform:uppercase;letter-spacing:.8px}
      .d-nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;color:var(--text2);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;border:none;background:none;width:100%;text-align:left;font-family:var(--font);margin-bottom:2px}
      .d-nav-item:hover{background:var(--bg);color:var(--text)}
      .d-nav-item.active{background:var(--accent-light);color:var(--accent)}
      .d-nav-item .dni{font-size:1.1rem;width:24px;text-align:center}
      .d-nav-badge{background:var(--warning-light);color:var(--warning);padding:2px 8px;border-radius:20px;font-size:.64rem;font-weight:700;margin-left:auto}
      .d-sidebar-footer{margin-top:auto;padding-top:16px;border-top:1px solid var(--border);display:flex;flex-direction:column;gap:4px}
      .d-sidebar-footer button{display:flex;align-items:center;gap:8px;padding:8px 12px;border-radius:10px;color:var(--text3);font-size:.75rem;font-weight:500;cursor:pointer;border:none;background:none;width:100%;text-align:left;font-family:var(--font);transition:all .15s}
      .d-sidebar-footer button:hover{color:var(--text);background:var(--bg)}
      .d-main{flex:1;margin-left:260px;padding:32px 40px;max-width:1100px}
      .d-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
      .d-hdr h1{font-size:1.6rem;font-weight:800;letter-spacing:-.5px}
      .d-hdr p{font-size:.8rem;color:var(--text3);margin-top:4px}
      .hdr{display:none}.bnav{display:none}.modal{left:260px}
    }

    /* ════════ STATS (shared) ════════ */
    .stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;padding:20px}
    @media(min-width:1024px){.stats-grid{padding:0;grid-template-columns:repeat(3,1fr);gap:16px;margin-bottom:32px}}
    .stat{background:var(--elevated);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px 16px;text-align:center;box-shadow:var(--shadow);position:relative;overflow:hidden;transition:all .25s;cursor:default}
    @media(min-width:1024px){.stat{padding:28px 24px;border-radius:18px}}
    .stat:hover{box-shadow:var(--shadow-lg);transform:translateY(-1px)}
    .stat-icon{font-size:1.4rem;margin-bottom:8px;opacity:.8}@media(min-width:1024px){.stat-icon{font-size:1.8rem;margin-bottom:12px}}
    .stat-val{font-size:2rem;font-weight:800;letter-spacing:-1.5px;line-height:1}@media(min-width:1024px){.stat-val{font-size:2.6rem}}
    .stat-lbl{font-size:.64rem;color:var(--text3);margin-top:6px;font-weight:600;text-transform:uppercase;letter-spacing:.6px}
    .stat::before{content:'';position:absolute;top:0;left:0;right:0;height:3px}
    .stat.today .stat-val{color:var(--accent2)}.stat.today::before{background:var(--accent2)}
    .stat.total .stat-val{color:var(--accent)}.stat.total::before{background:var(--accent)}
    .stat.wait .stat-val{color:var(--warning)}.stat.wait::before{background:var(--warning)}

    /* ════════ SECTION (shared) ════════ */
    .sec{padding:0 20px 12px;display:flex;align-items:center;justify-content:space-between}
    @media(min-width:1024px){.sec{padding:0 0 16px;margin-bottom:0}}
    .sec-title{font-size:.68rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:1.2px}
    .sec-count{font-size:.62rem;color:var(--text3);background:var(--border-strong);padding:2px 8px;border-radius:20px;font-weight:600}

    /* ════════ MOBILE CARDS ════════ */
    @media(max-width:1023px){
      .list{padding:0 16px;display:flex;flex-direction:column;gap:10px}
      .card{background:var(--elevated);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 18px;box-shadow:var(--shadow);display:flex;gap:14px;align-items:center;cursor:pointer;transition:all .2s}
      .card:active{transform:scale(.985);border-color:var(--accent)}
      .card-body{flex:1;min-width:0}
      .card-meta{display:flex;align-items:center;gap:8px;margin-bottom:5px}
      .card-date{font-size:.72rem;font-weight:600;color:var(--text2);background:var(--bg);padding:3px 10px;border-radius:20px;white-space:nowrap}
      .card-name{font-size:.92rem;font-weight:700;color:var(--text);margin-bottom:1px;letter-spacing:-.2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .card-addr{font-size:.7rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
      .card-phone{font-size:.7rem;color:var(--accent);font-weight:600}
      .qact{display:flex;gap:6px;margin-top:10px}
      .qact-btn{flex:1;border:1px solid var(--border-strong);background:transparent;color:var(--text2);padding:8px 0;border-radius:8px;font-size:.66rem;font-weight:700;cursor:pointer;text-align:center;transition:all .15s;font-family:var(--font)}
      .qact-btn:active{transform:scale(.96)}
      .qact-btn.accept{color:var(--accent);border-color:var(--accent)}.qact-btn.accept:active,.qact-btn.accept:hover{background:var(--accent);color:#fff}
      .qact-btn.done{color:var(--accent2);border-color:var(--accent2)}.qact-btn.done:active,.qact-btn.done:hover{background:var(--accent2);color:#fff}
      .qact-btn.decline{color:var(--danger);border-color:var(--danger)}.qact-btn.decline:active,.qact-btn.decline:hover{background:var(--danger);color:#fff}
    }

    /* ════════ DESKTOP TABLE ════════ */
    @media(min-width:1024px){
      .list{padding:0;display:flex;flex-direction:column;gap:0}
      table{width:100%;border-collapse:collapse}
      thead th{padding:12px 16px;text-align:left;font-size:.66rem;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.8px;border-bottom:1px solid var(--border);background:var(--bg)}
      thead th:first-child{border-radius:12px 0 0 0}thead th:last-child{border-radius:0 12px 0 0}
      tbody td{padding:14px 16px;border-bottom:1px solid var(--border);font-size:.82rem;vertical-align:middle}
      tbody tr{background:var(--elevated);transition:background .12s}
      tbody tr:hover{background:var(--border)}
      .d-card{background:var(--elevated);border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden;box-shadow:var(--shadow)}
      .d-name strong{font-weight:700;letter-spacing:-.2px}
      .d-addr{color:var(--text3);font-size:.74rem;max-width:200px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
      .d-phone{color:var(--accent);font-weight:600;font-size:.78rem}
      .d-date{padding:4px 10px;background:var(--bg);border-radius:20px;font-size:.7rem;font-weight:600;color:var(--text2);white-space:nowrap;display:inline-block}
      .d-dot{display:inline-block;margin:0 6px;color:var(--text3)}
      .d-acts{display:flex;gap:6px}
      .d-btn{padding:8px 15px;border:1px solid var(--border-strong);border-radius:10px;font-size:.72rem;font-weight:700;cursor:pointer;background:transparent;color:var(--text2);transition:all .12s;font-family:var(--font);white-space:nowrap}
      .d-btn:hover{border-color:var(--accent);color:var(--accent)}
      .d-btn.acc:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
      .d-btn.don:hover{background:var(--accent2);color:#fff;border-color:var(--accent2)}
      .d-btn.del:hover{background:var(--danger);color:#fff;border-color:var(--danger)}
    }

    /* ════════ BADGE (shared) ════════ */
    .bc-badge{display:inline-flex;align-items:center;gap:4px;padding:4px 12px;border-radius:20px;font-size:.64rem;font-weight:600;text-transform:none;letter-spacing:.1px;white-space:nowrap}
    .bc-badge.pending{background:var(--warning-light);color:var(--warning)}
    .bc-badge.confirmed{background:var(--accent-light);color:var(--accent)}
    .bc-badge.completed{background:var(--accent2-light);color:var(--accent2)}
    .bc-badge.cancelled{background:var(--danger-light);color:var(--danger)}
    .bc-badge .bdot{width:6px;height:6px;border-radius:50%;background:currentColor}
    @media(min-width:1024px){.bc-badge{font-size:.66rem;padding:5px 14px}}

    /* ════════ MOBILE TAB NAV (below header) ════════ */
    .mnav{background:var(--overlay);border-bottom:1px solid var(--border);padding:8px 16px 10px;display:flex;gap:6px;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;display:none}
    .mnav::-webkit-scrollbar{display:none}
    .mnav-item{flex-shrink:0;padding:7px 16px;border-radius:20px;border:1px solid transparent;background:var(--accent-light);color:var(--text2);font-size:.7rem;font-weight:600;cursor:pointer;white-space:nowrap;transition:all .15s;font-family:var(--font)}
    .mnav-item.active{background:var(--accent);color:#fff;border-color:var(--accent)}
    .mnav-item:active{transform:scale(.96)}

    /* ════════ HAMBURGER DRAWER ════════ */
    .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:55;opacity:0;pointer-events:none;transition:opacity .25s}
    .drawer-overlay.open{opacity:1;pointer-events:auto}
    .drawer{position:fixed;top:0;right:0;bottom:0;width:280px;max-width:85vw;background:var(--elevated);z-index:60;transform:translateX(100%);transition:transform .25s cubic-bezier(.16,1,.3,1);box-shadow:var(--shadow-lg);display:flex;flex-direction:column;overflow-y:auto;scrollbar-width:none;-ms-overflow-style:none}
    .drawer::-webkit-scrollbar{width:0!important;height:0!important;display:none!important}
    .drawer.open{transform:translateX(0)}
    .drawer-menu{padding:8px}
    .drawer-item{display:flex;align-items:center;gap:10px;padding:12px 14px;border-radius:10px;color:var(--text2);font-size:.8rem;font-weight:600;cursor:pointer;transition:all .12s;border:none;background:none;width:100%;text-align:left;font-family:var(--font)}
    .drawer-item:hover{background:var(--bg);color:var(--text)}
    .drawer-item span{width:24px;text-align:center;font-size:1rem}
    .bnav{position:fixed;bottom:0;left:0;right:0;background:var(--overlay);backdrop-filter:saturate(180%) blur(24px);-webkit-backdrop-filter:saturate(180%) blur(24px);border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 0 16px;z-index:50}
    @media(max-width:1023px){.bnav{display:flex}}
    @supports(padding-bottom:env(safe-area-inset-bottom)){.bnav{padding-bottom:calc(8px + env(safe-area-inset-bottom))}}
    .bnav-item{display:flex;flex-direction:column;align-items:center;gap:3px;background:none;border:none;color:var(--text3);cursor:pointer;padding:6px 14px;transition:all .2s;font-family:var(--font);position:relative}
    .bnav-item.active{color:var(--accent)}.bnav-item.active::after{content:'';position:absolute;top:-8px;width:20px;height:2px;border-radius:2px;background:var(--accent)}
    .bnav-item .bni{font-size:1.25rem}.bnav-item.active .bni{transform:translateY(-1px)}
    .bnav-item .bnl{font-size:.58rem;font-weight:700;text-transform:uppercase;letter-spacing:.6px}

    /* ════════ MODAL ════════ */
    @media(max-width:1023px){
      .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:flex-end;justify-content:center;padding:10px;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
      .modal.show{display:flex}.modal.show .m-sheet{animation:mu .3s cubic-bezier(.16,1,.3,1)}
      @keyframes mu{from{transform:translateY(100%);opacity:0}to{transform:translateY(0);opacity:1}}
      .m-sheet{background:var(--elevated);border:1px solid var(--border-strong);border-radius:24px 24px 0 0;padding:24px 20px 32px;width:100%;max-width:448px;max-height:82dvh;overflow-y:auto;box-shadow:0 -4px 24px rgba(0,0,0,.08)}
    }
    @media(min-width:1024px){
      .modal{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:100;display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}
      .modal.show{display:flex}.modal.show .m-sheet{animation:mdScale .2s cubic-bezier(.16,1,.3,1)}
      @keyframes mdScale{from{transform:scale(.94);opacity:0}to{transform:scale(1);opacity:1}}
      .m-sheet{background:var(--elevated);border:1px solid var(--border-strong);border-radius:24px;padding:32px;width:480px;max-height:80vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,.12)}
    }
    .m-sheet h3{font-size:1rem;font-weight:700;margin-bottom:20px;display:flex;align-items:center;gap:8px;letter-spacing:-.2px}
    .m-dot{width:8px;height:8px;border-radius:50%;background:var(--accent)}
    .m-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:.78rem}@media(min-width:1024px){.m-row{font-size:.82rem}}
    .m-row:last-child{border:none}.m-row .mk{color:var(--text3);font-weight:500}.m-row .mv{color:var(--text);font-weight:600;text-align:right;max-width:65%;word-break:break-word}
    .m-wa{display:inline-flex;align-items:center;gap:4px;color:var(--accent);font-weight:700;text-decoration:none;font-size:.78rem;padding:6px 14px;background:var(--accent-light);border-radius:20px;transition:all .15s}.m-wa:active{transform:scale(.96)}
    .m-acts{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:20px}
    .m-btn{padding:12px;border:none;border-radius:10px;font-weight:700;font-size:.74rem;cursor:pointer;transition:all .15s;font-family:var(--font);letter-spacing:-.1px}
    .m-btn:active{transform:scale(.97)}.m-btn.accept{background:var(--accent);color:#fff}.m-btn.done{background:var(--accent2);color:#fff}.m-btn.decline{background:var(--danger);color:#fff}.m-btn.close{background:var(--border-strong);color:var(--text);grid-column:1/-1}

    /* ════════ COMMON ════════ */
    .empty{text-align:center;padding:64px 20px}.empty .eicon{font-size:2.8rem;margin-bottom:12px;opacity:.7}.empty h2{font-size:.95rem;font-weight:700;margin-bottom:4px}.empty p{color:var(--text3);font-size:.78rem}
    .spin{display:flex;align-items:center;justify-content:center;padding:48px;gap:6px}.spin-dot{width:5px;height:5px;border-radius:50%;background:var(--accent);animation:sp 1.4s infinite}.spin-dot:nth-child(2){animation-delay:.2s}.spin-dot:nth-child(3){animation-delay:.4s}@keyframes sp{0%,80%,100%{opacity:.2;transform:scale(.8)}40%{opacity:1;transform:scale(1.3)}}

    /* ════════ SCHEDULE CALENDAR ════════ */
    .cal-wrap{background:var(--elevated);border:1px solid var(--border);border-radius:16px;padding:16px;max-width:820px}
    .cal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
    .cal-head h3{font-size:1rem;font-weight:700}
    .cal-nav{display:flex;gap:6px}
    .cal-nav button{width:34px;height:34px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg);color:var(--text);cursor:pointer;font-family:var(--font);font-size:1rem}
    .cal-nav button:active{transform:scale(.94)}
    .cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
    .cal-dh{text-align:center;font-size:.58rem;font-weight:700;color:var(--text3);padding:4px 0;text-transform:uppercase;letter-spacing:.4px}
    .cal-cell{min-height:58px;border:1px solid var(--border);border-radius:10px;padding:5px 6px;position:relative;cursor:pointer;transition:all .15s;background:var(--bg)}
    .cal-cell:hover{border-color:var(--accent)}
    .cal-cell.empty{background:transparent;border:none;cursor:default}
    .cal-cell.today{border-color:var(--accent2);box-shadow:0 0 0 1px var(--accent2)}
    .cal-cell .cnum{font-size:.74rem;font-weight:700}
    .cal-cell .cbadge{position:absolute;bottom:5px;right:6px;font-size:.58rem;font-weight:800;padding:1px 7px;border-radius:10px;background:var(--accent-light);color:var(--accent)}
    .cal-cell.all-done .cbadge{background:var(--accent2-light);color:var(--accent2)}
    .cal-cell .cdot{position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:50%;background:var(--danger)}
    .day-head{display:flex;align-items:center;gap:10px;margin:18px 0 12px}
    .day-head h3{font-size:.95rem;font-weight:700}
    .day-head button{padding:6px 14px;border-radius:10px;border:1px solid var(--border-strong);background:var(--bg);color:var(--text2);cursor:pointer;font-family:var(--font);font-size:.72rem;font-weight:600}
    .tk-card{background:var(--elevated);border:1px solid var(--border);border-radius:14px;padding:14px 16px;margin-bottom:8px;cursor:pointer;display:flex;gap:12px;align-items:center;transition:all .15s}
    .tk-card:hover{border-color:var(--accent)}
    .tk-slot{font-size:.7rem;font-weight:700;color:var(--text2);background:var(--bg);padding:5px 11px;border-radius:20px;white-space:nowrap}
    .tk-body{flex:1;min-width:0}
    .tk-name{font-weight:700;font-size:.9rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .tk-addr{font-size:.7rem;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .bc-badge.unassigned{background:var(--danger-light);color:var(--danger)}
    .bc-badge.assigned{background:var(--accent2-light);color:var(--accent2)}
    .bc-badge.in_progress{background:var(--warning-light);color:var(--warning)}
    .bc-badge.awaiting_review{background:var(--warning-light);color:var(--warning)}
    .mv-sel{padding:10px;border:1px solid var(--border-strong);border-radius:10px;background:var(--bg);color:var(--text);font-family:var(--font);font-size:.82rem;width:100%}
    .tl{display:flex;flex-direction:column;gap:6px;margin-top:4px}

async function load(filter){
  cf=filter||null;
  var isDesktop=matchMedia('(min-width:1024px)').matches;
  clearNav();
  var nm={'':['dsAll','navAll'],'pending_payment':['dsWait','navWait'],'confirmed':['dsOK','navOK'],'completed':['dsDone','navDone']};
  var ids=nm[filter||'']||nm[''];setNav(ids[0]);setNav(ids[1]);
  var l=document.getElementById('list');l.innerHTML='<div class="spin"><div class="spin-dot"></div><div class="spin-dot"></div><div class="spin-dot"></div></div>';
  try{
    var{data,error}=await SB.from('bookings').select('*').order('booking_date',{ascending:true}).order('booking_time',{ascending:true});
    if(error)throw error;all=data||[];
    var f=filter?all.filter(function(b){return b.status===filter}):all;
    updateStats(all);document.getElementById('secCount').textContent=f.length;
    document.getElementById('dsBadge').textContent=all.filter(function(b){return b.status==='pending_payment'}).length;
    document.getElementById('drBadge').textContent=all.filter(function(b){return b.status==='pending_payment'}).length;
    if(!f.length){l.innerHTML='<div class="empty"><div class="eicon"><i data-lucide="inbox"></i></div><h2>No Bookings</h2><p>New bookings will appear here.</p></div>';return}

    renderBookings(f);
  }catch(e){l.innerHTML='<div class="empty"><div class="eicon"><i data-lucide="alert-triangle"></i></div><h2>Error</h2><p>'+e.message+'</p></div>'}
}

function initials(n){var p=(n||'').trim().split(/\s+/);return ((((p[0]||'')[0]||'')+((p[1]||'')[0]||'')).toUpperCase())||'?';}
function renderBookings(f){
  var isDesktop=matchMedia('(min-width:1024px)').matches;
  if(isDesktop){
    var h='<div class="d-card"><table><thead><tr><th>Customer</th><th>Date &amp; Time</th><th>Payment</th><th>Status</th><th></th></tr></thead><tbody>';
    f.forEach(function(b){
      var pay=(b.payment_status==='paid'?'Paid':'pending');
      h+='<tr onclick="showModal(\''+b.id+'\')" style="cursor:pointer">';
      h+='<td><div style="display:flex;align-items:center;gap:10px"><div class="bk-ava" style="width:38px;height:38px;border-radius:11px;font-size:.8rem">'+initials(b.customer_name)+'</div><div style="min-width:0"><div class="d-name"><strong>'+esc(b.customer_name)+'</strong></div><div class="d-addr" style="max-width:200px">'+esc(b.customer_address)+'</div></div></div></td>';
      h+='<td><span class="d-date">'+fd(b.booking_date)+'</span><span class="d-dot"></span><span class="d-date">'+ft(b.booking_time)+'</span></td>';
      h+='<td><span style="font-size:.78rem;font-weight:600;color:'+(pay==='Paid'?'var(--accent)':'var(--warning)')+'">RM'+esc(b.deposit_amount)+' &middot; '+pay+'</span></td>';
      h+='<td>'+badge(b.status)+'</td>';
      h+='<td><div class="d-acts" onclick="event.stopPropagation()">';
      if(b.status==='pending_payment')h+='<button class="d-btn acc" onclick="quickUpdate(\''+b.id+'\',\'confirmed\')"><i data-lucide="check"></i></button>';
      if(b.status==='confirmed'||b.status==='pending_payment')h+='<button class="d-btn don" onclick="quickUpdate(\''+b.id+'\',\'completed\')"><i data-lucide="check-check"></i></button>';
      h+='<button class="d-btn" style="color:#25D366;border-color:#25D366" onclick="window.open(\'https://wa.me/'+waNum(b.customer_phone)+'\',\'_blank\')"><i data-lucide="message-circle"></i></button>';
      if(b.status!=='cancelled'&&b.status!=='completed')h+='<button class="d-btn del" onclick="quickUpdate(\''+b.id+'\',\'cancelled\')"><i data-lucide="x"></i></button>';
      h+='</div></td></tr>';
    });
    h+='</tbody></table></div>';
    document.getElementById('list').innerHTML=h;
  }else{
    var h='';
    f.forEach(function(b){
      var pay=(b.payment_status==='paid'?'Paid':'Pending');
      h+='<div class="card" onclick="showModal(\''+b.id+'\')"><div class="bk-ava" style="width:44px;height:44px;border-radius:12px;font-size:.9rem;flex-shrink:0">'+initials(b.customer_name)+'</div><div class="card-body"><div class="card-meta"><span class="card-date">'+fd(b.booking_date)+' '+ft(b.booking_time)+'</span>'+badge(b.status)+'</div><div class="card-name">'+esc(b.customer_name)+'</div><div class="card-addr">'+esc(b.customer_address)+'</div><div class="card-phone">RM'+esc(b.deposit_amount)+' &middot; '+pay+'</div><div class="qact">';
      if(b.status==='pending_payment')h+='<button class="qact-btn accept" onclick="event.stopPropagation();quickUpdate(\''+b.id+'\',\'confirmed\')">Confirm</button>';
      if(b.status==='confirmed'||b.status==='pending_payment')h+='<button class="qact-btn done" onclick="event.stopPropagation();quickUpdate(\''+b.id+'\',\'completed\')">Complete</button>';
      h+='<button class="qact-btn" style="color:#25D366;border-color:#25D366" onclick="event.stopPropagation();window.open(\'https://wa.me/'+waNum(b.customer_phone)+'\',\'_blank\')">WA</button>';
      if(b.status!=='cancelled'&&b.status!=='completed')h+='<button class="qact-btn decline" onclick="event.stopPropagation();quickUpdate(\''+b.id+'\',\'cancelled\')">Cancel</button>';
      h+='</div></div></div>';
    });
    document.getElementById('list').innerHTML=h;
  }
}

function updateStats(d){
  var t=new Date().toISOString().split('T')[0];
  document.getElementById('sToday').textContent=d.filter(function(b){return b.booking_date===t}).length;
  document.getElementById('sTotal').textContent=d.length;
  document.getElementById('sWait').textContent=d.filter(function(b){return b.status==='pending_payment'}).length;
}

function showModal(id){
  cid=id;var b=all.find(function(x){return x.id===id});if(!b)return;
  document.getElementById('mTitle').innerHTML='<span class="m-dot"></span>'+b.customer_name;
  var ph=b.customer_phone.replace(/[^0-9]/g,'');if(ph.startsWith('0'))ph='6'+ph.substring(1);
  document.getElementById('mBody').innerHTML=
    '<div class="m-row"><span class="mk">Date & Time</span><span class="mv">'+fd(b.booking_date)+' · '+ft(b.booking_time)+'</span></div>'+
    '<div class="m-row"><span class="mk">Phone</span><span class="mv"><a class="m-wa" href="https://wa.me/'+ph+'" target="_blank"><i data-lucide="message-circle"></i> WhatsApp</a></span></div>'+
    '<div class="m-row"><span class="mk">Address</span><span class="mv">'+b.customer_address.replace(/</g,'&lt;')+'</span></div>'+
    '<div class="m-row"><span class="mk">Total</span><span class="mv">RM'+b.amount+'</span></div>'+
    '<div class="m-row"><span class="mk">Deposit</span><span class="mv">RM'+b.deposit_amount+'</span></div>'+
    '<div class="m-row"><span class="mk">Payment</span><span class="mv">'+b.payment_status+'</span></div>'+
    '<div class="m-row"><span class="mk">Ref</span><span class="mv" style="font-size:.65rem;opacity:.6">'+b.id+'</span></div>';
  var a='';
  if(b.status==='pending_payment')a+='<button class="m-btn accept" onclick="updateStatus(\''+id+'\',\'confirmed\')"><i data-lucide="check"></i> Confirm</button>';
  if(b.status==='confirmed'||b.status==='pending_payment')a+='<button class="m-btn done" onclick="updateStatus(\''+id+'\',\'completed\')"><i data-lucide="check-check"></i> Complete</button>';
  a+='<button class="m-btn decline" onclick="updateStatus(\''+id+'\',\'cancelled\')"><i data-lucide="x"></i> Cancel</button>';
  a+='<button class="m-btn close" onclick="closeModal()">Close</button>';
  document.getElementById('mActs').innerHTML=a;document.getElementById('modal').classList.add('show');
}
function closeModal(){document.getElementById('modal').classList.remove('show');cid=null}
async function updateStatus(id,s){try{await SB.from('bookings').update({status:s,updated_at:new Date().toISOString()}).eq('id',id);closeModal();load(cf)}catch(e){alert(e.message)}}
async function quickUpdate(id,s){try{await SB.from('bookings').update({status:s,updated_at:new Date().toISOString()}).eq('id',id);load(cf)}catch(e){alert(e.message)}}

// ═══════════ VIEW SWITCHING ═══════════
function esc(s){return(s||'').toString().replace(/[<>&"]/g,function(c){return{'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c]})}
function setChrome(show){var g=document.querySelector('.stats-grid'),s=document.querySelector('.sec');if(g)g.style.display=show?'':'none';if(s)s.style.display=show?'':'none';}
function clearNav(){document.querySelectorAll('.d-nav-item,.bnav-item').forEach(function(n){n.classList.remove('active')});}
function setNav(id){var el=document.getElementById(id);if(el)el.classList.add('active');}
function setHeader(title,sub){var t=document.getElementById('dTitle'),s=document.getElementById('dSub');if(t)t.textContent=title;if(s)s.textContent=sub;}
function showBookings(filter){currentView='bookings';setChrome(true);setHeader('Bookings','All customer bookings');document.getElementById('secTitle').textContent='Bookings';location.hash='#bookings';if(filter)location.hash='#pending';load(filter);}
function refreshView(){if(currentView==='staff')showStaff();else if(currentView==='settings')showSettings();else if(currentView==='schedule')showSchedule();else if(currentView==='dashboard')showDashboard();else if(currentView==='reports')showReports();else load(cf);}

// ═══════════ DASHBOARD ═══════════
function mrow(x){var b=x.b,t=x.t;return '<div class="mrow" onclick="openTask(\''+t.id+'\')"><span class="mslot">'+ft(b.booking_time)+'</span><div class="mb"><div class="mn">'+esc(b.customer_name)+'</div><div class="ma"><i data-lucide="map-pin"></i><span class="txt">'+esc(b.customer_address)+'</span></div></div>'+taskBadge(t.status)+'</div>';}
async function showDashboard(){
  currentView='dashboard';setChrome(false);clearNav();setNav('dsDash');setNav('navDash');
  setHeader('Dashboard','Overview of operations');location.hash='#home';
  var l=document.getElementById('list');
  l.innerHTML='<div class="spin"><div class="spin-dot"></div><div class="spin-dot"></div><div class="spin-dot"></div></div>';
  try{
    await loadTaskData();
    var bq=await SB.from('bookings').select('*').order('created_at',{ascending:false});
    var bookings=bq.data||[];all=bookings;
    var _n=new Date(),t=_n.getFullYear()+'-'+String(_n.getMonth()+1).padStart(2,'0')+'-'+String(_n.getDate()).padStart(2,'0');
    var cnt=function(f){return taskList.filter(f).length};
    var kToday=taskList.filter(function(x){return x.b.booking_date===t}).length;
    var kUn=cnt(function(x){return x.t.status==='unassigned'});
    var kProg=cnt(function(x){return x.t.status==='in_progress'});
    var kRev=cnt(function(x){return x.t.status==='awaiting_review'});
    var kDone=cnt(function(x){return x.t.status==='completed'});
    var kPay=bookings.filter(function(b){return b.status==='pending_payment'}).length;
    var kStaff=staffList.length;
    var dep=parseInt(settings.price_deposit||'150',10);
    var kDeposit=bookings.filter(function(b){return b.payment_status==='paid'}).length*dep;
    function kpi(cls,icon,val,label){return '<div class="kpi '+cls+'"><div class="kpi-ic"><i data-lucide="'+icon+'"></i></div><div class="kpi-v">'+val+'</div><div class="kpi-l">'+label+'</div></div>';}
    var h='<div class="dash-grid">';
    h+=kpi('blue','calendar-days',kToday,"Today's Jobs");
    h+=kpi('red','alert-circle',kUn,'Unassigned');
    h+=kpi('amber','loader',kProg,'In Progress');
    h+=kpi('amber','eye',kRev,'Awaiting Review');
    h+=kpi('green','check-check',kDone,'Completed');
    h+=kpi('red','credit-card',kPay,'Pending Payment');
    h+=kpi('blue','users',kStaff,'Active Staff');
    h+=kpi('green','banknote','RM'+kDeposit,'Deposits Collected');
    h+='</div>';
    h+='<div class="panels">';
    var attn=taskList.filter(function(x){return x.t.status==='unassigned'||x.t.status==='awaiting_review'}).sort(function(a,b){return (a.b.booking_date||'').localeCompare(b.b.booking_date||'')});
    h+='<div class="panel"><div class="panel-h"><h3><i data-lucide="bell"></i> Needs Attention</h3><span class="sec-count">'+attn.length+'</span></div>';
    if(!attn.length)h+='<div class="panel-empty"><i data-lucide="check-circle"></i>All clear!</div>';
    else attn.slice(0,6).forEach(function(x){h+=mrow(x)});
    h+='</div>';
    var todays=taskList.filter(function(x){return x.b.booking_date===t}).sort(function(a,b){return slotOrder(a.b.booking_time)-slotOrder(b.b.booking_time)});
    h+='<div class="panel"><div class="panel-h"><h3><i data-lucide="calendar-clock"></i> Today\'s Schedule</h3><button class="lnk" onclick="showSchedule()">Calendar</button></div>';
    if(!todays.length)h+='<div class="panel-empty"><i data-lucide="coffee"></i>No jobs today.</div>';
    else todays.forEach(function(x){h+=mrow(x)});
    h+='</div>';
    h+='</div>';
    h+='<div class="panel"><div class="panel-h"><h3><i data-lucide="history"></i> Recent Bookings</h3><button class="lnk" onclick="showBookings()">View all</button></div>';
    if(!bookings.length)h+='<div class="panel-empty"><i data-lucide="inbox"></i>No bookings yet.</div>';
    else bookings.slice(0,5).forEach(function(b){h+='<div class="mrow" onclick="showModal(\''+b.id+'\')"><span class="mslot">'+ft(b.booking_time)+'</span><div class="mb"><div class="mn">'+esc(b.customer_name)+'</div><div class="ma">'+fd(b.booking_date)+'</div></div>'+badge(b.status)+'</div>';});
    h+='</div>';
    l.innerHTML=h;
  }catch(e){l.innerHTML='<div class="empty"><div class="eicon"><i data-lucide="alert-triangle"></i></div><h2>Error</h2><p>'+esc(e.message)+'</p></div>';}
}

// ═══════════ REPORTS ═══════════
async function showReports(){
  currentView='reports';setChrome(false);clearNav();setNav('dsReports');
  setHeader('Reports','Performance & revenue analytics');location.hash='#reports';
  var l=document.getElementById('list');
  l.innerHTML='<div class="spin"><div class="spin-dot"></div><div class="spin-dot"></div><div class="spin-dot"></div></div>';
  try{
    var bq=await SB.from('bookings').select('*').order('booking_date',{ascending:false});
    var bookings=bq.data||[];
    await loadTaskData();
    if(!staffCache.length){var{data}=await SB.from('profiles').select('*').order('created_at',{ascending:false});staffCache=(data||[]).filter(function(p){return p.role==='staff'})}
    var profiles=staffCache;
    var dep=parseInt(settings.price_deposit||'150',10);
    var bal=parseInt(settings.price_balance||'150',10);

    var now=new Date(),t=now.toISOString().split('T')[0];
    var weekAgo=new Date(now);weekAgo.setDate(weekAgo.getDate()-7);var w=weekAgo.toISOString().split('T')[0];
    var monthAgo=new Date(now);monthAgo.setMonth(monthAgo.getMonth()-1);var m=monthAgo.toISOString().split('T')[0];

    function cnt(f){return bookings.filter(f).length}
    function sum(f){var s=0;bookings.filter(f).forEach(function(b){s+=dep});return s}
    var paidB=bookings.filter(function(b){return b.payment_status==='paid'});
    var completedB=bookings.filter(function(b){return b.status==='completed'});
    var totalDeposits=paidB.length*dep;
    var totalBalance=completedB.length*bal;
    var totalRevenue=totalDeposits+totalBalance;
    var tasksCompleted=taskList.filter(function(x){return x.t.status==='completed'}).length;

    function rKpi(cls,icon,val,label){return '<div class="kpi '+cls+'"><div class="kpi-ic"><i data-lucide="'+icon+'"></i></div><div class="kpi-v">'+val+'</div><div class="kpi-l">'+label+'</div></div>'}

    var h='<div class="dash-grid">';
    h+=rKpi('green','banknote','RM'+totalRevenue,'Total Revenue');
    h+=rKpi('blue','credit-card','RM'+totalDeposits,'Deposits Collected');
    h+=rKpi('amber','hourglass','RM'+totalBalance,'Balance Outstanding');
    h+=rKpi('green','check-check',tasksCompleted,'Jobs Completed');
    h+='</div>';

    h+='<div class="panels">';

    // Staff leaderboard
    h+='<div class="panel"><div class="panel-h"><h3><i data-lucide="users"></i> Staff Leaderboard</h3><span class="sec-count">'+profiles.length+' staff</span></div>';
    if(!profiles.length)h+='<div class="panel-empty">No staff yet.</div>';
    else{
      var staffStats=profiles.map(function(p){
        var jobs=taskList.filter(function(x){return x.t.assigned_to===p.id&&x.t.status==='completed'}).length;
        var active=taskList.filter(function(x){return x.t.assigned_to===p.id&&['assigned','in_progress','awaiting_review'].indexOf(x.t.status)>-1}).length;
        return {name:p.full_name,area:p.service_area||'-',completed:jobs,active:active};
      }).sort(function(a,b){return b.completed-a.completed});
      staffStats.forEach(function(s,i){
        h+='<div class="mrow"><span style="font-size:.8rem;font-weight:700;color:var(--text3);min-width:22px">#'+(i+1)+'</span><div class="mb"><div class="mn">'+esc(s.name)+'</div><div class="ma">'+esc(s.area)+(s.active?' &middot; '+s.active+' active':'')+'</div></div><span style="font-size:.78rem;font-weight:700;color:var(--accent)">'+s.completed+' jobs</span></div>';
      });
    }
    h+='</div>';

    // Area breakdown
    var areaMap={};
    bookings.forEach(function(b){
      var a=detectArea(b.customer_address)||'Unknown';
      if(!areaMap[a])areaMap[a]={total:0,completed:0,deposits:0};
      areaMap[a].total++;
      if(b.status==='completed')areaMap[a].completed++;
      if(b.payment_status==='paid')areaMap[a].deposits+=dep;
    });
    h+='<div class="panel"><div class="panel-h"><h3><i data-lucide="map-pin"></i> By Area</h3><span class="sec-count">'+Object.keys(areaMap).length+' areas</span></div>';
    if(!Object.keys(areaMap).length)h+='<div class="panel-empty">No data.</div>';
    else{
      Object.keys(areaMap).sort(function(a,b){return areaMap[b].total-areaMap[a].total}).forEach(function(a){
        var d=areaMap[a];
        h+='<div class="mrow"><div class="mb"><div class="mn">'+esc(a)+'</div><div class="ma">'+d.total+' bookings &middot; '+d.completed+' completed</div></div><span style="font-size:.78rem;font-weight:700;color:var(--accent2)">RM'+d.deposits+'</span></div>';
      });
    }
    h+='</div>';

    // Monthly trend
    var monthMap={};
    bookings.forEach(function(b){
      var key=(b.booking_date||'').substring(0,7);if(!key)return;
      if(!monthMap[key])monthMap[key]={total:0,completed:0,revenue:0};
      monthMap[key].total++;
      if(b.status==='completed'){monthMap[key].completed++;monthMap[key].revenue+=dep+bal}
      else if(b.payment_status==='paid')monthMap[key].revenue+=dep;
    });
    var months=Object.keys(monthMap).sort().slice(-6);
    h+='</div><div class="panels"><div class="panel" style="grid-column:1/-1"><div class="panel-h"><h3><i data-lucide="trending-up"></i> Monthly Trend</h3><span class="sec-count">Last '+months.length+' months</span></div>';
    if(!months.length)h+='<div class="panel-empty">No data.</div>';
    else{
      h+='<div style="overflow-x:auto"><table><thead><tr><th>Month</th><th>Bookings</th><th>Completed</th><th>Revenue</th></tr></thead><tbody>';
      months.forEach(function(mo){
        var d=monthMap[mo];
        h+='<tr><td style="font-weight:700">'+mo+'</td><td>'+d.total+'</td><td>'+d.completed+'</td><td>RM'+d.revenue+'</td></tr>';
      });
      h+='</tbody></table></div>';
    }
    h+='</div></div>';

    // Recent 10 bookings quick view
    h+='<div class="panel"><div class="panel-h"><h3><i data-lucide="history"></i> Recent Bookings</h3></div>';
    if(!bookings.length)h+='<div class="panel-empty">No bookings.</div>';
    else bookings.slice(0,10).forEach(function(b){
      h+='<div class="mrow" onclick="showModal(\''+b.id+'\')"><span class="mslot">'+ft(b.booking_time)+'</span><div class="mb"><div class="mn">'+esc(b.customer_name)+'</div><div class="ma">'+fd(b.booking_date)+' &middot; Deposit: '+(b.payment_status==='paid'?'Paid':'Pending')+'</div></div>'+badge(b.status)+'</div>';
    });
    h+='</div>';

    l.innerHTML=h;
  }catch(e){l.innerHTML='<div class="empty"><div class="eicon"><i data-lucide="alert-triangle"></i></div><h2>Error</h2><p>'+esc(e.message)+'</p></div>';}
}

function renderCalendar(){
  var mn=['January','February','March','April','May','June','July','August','September','October','November','December'];
  var byDay={};taskList.forEach(function(x){var d=x.b.booking_date;if(!d)return;(byDay[d]=byDay[d]||[]).push(x)});
  var fdw=new Date(scYear,scMonth,1).getDay(),dim=new Date(scYear,scMonth+1,0).getDate();

  h+='<div class="cal-wrap"><div class="cal-head"><h3>'+mn[scMonth]+' '+scYear+'</h3><div class="cal-nav"><button onclick="scPrev()"><i data-lucide="chevron-left"></i></button><button onclick="scNext()"><i data-lucide="chevron-right"></i></button></div></div><div class="cal-grid">';

  var areas=(settings.service_areas||'').split(',').map(function(s){return s.trim()}).filter(Boolean);
  var h='<div class="day-head"><h3>'+fd(ds)+'</h3><span class="sec-count">'+jobs.length+' job(s)</span></div>';
  if(!jobs.length){h+='<div class="empty" style="padding:32px"><div class="eicon"><i data-lucide="calendar"></i></div><p>No jobs on this date.</p></div>';}
  else if(areas.length){
    var grp={};jobs.forEach(function(x){var a=detectArea(x.b.customer_address)||'Other';if(!grp[a])grp[a]=[];grp[a].push(x)});
    Object.keys(grp).sort().forEach(function(a){
      if(areas.length>1)h+='<div style="font-size:.68rem;font-weight:700;color:var(--accent);padding:10px 4px 4px;display:flex;align-items:center;gap:6px"><i data-lucide="map-pin"></i> '+esc(a)+' <span class="sec-count">'+grp[a].length+'</span></div>';
      grp[a].forEach(function(x){
        h+='<div class="tk-card" onclick="openTask(\''+x.t.id+'\')"><span class="tk-slot">'+ft(x.b.booking_time)+'</span><div class="tk-body"><div class="tk-name">'+esc(x.b.customer_name)+'</div><div class="tk-addr"><i data-lucide="map-pin"></i> '+esc(x.b.customer_address)+'</div><div style="margin-top:4px;font-size:.68rem;color:var(--text3)">'+(x.s?'<i data-lucide="user"></i> '+esc(x.s.full_name):'<i data-lucide="alert-triangle"></i> Unassigned')+'</div></div>'+taskBadge(x.t.status)+'</div>';
      });
    });
  }
  else{jobs.forEach(function(x){
    h+='<div class="tk-card" onclick="openTask(\''+x.t.id+'\')"><span class="tk-slot">'+ft(x.b.booking_time)+'</span><div class="tk-body"><div class="tk-name">'+esc(x.b.customer_name)+'</div><div class="tk-addr"><i data-lucide="map-pin"></i> '+esc(x.b.customer_address)+'</div><div style="margin-top:4px;font-size:.68rem;color:var(--text3)">'+(x.s?'<i data-lucide="user"></i> '+esc(x.s.full_name):'<i data-lucide="alert-triangle"></i> Unassigned')+'</div></div>'+taskBadge(x.t.status)+'</div>';
  });}
  document.getElementById('dayList').innerHTML=h;
  if(!keep)document.getElementById('dayList').scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ═══════════ TASK DETAIL ═══════════
async function openTask(taskId){
  var x=taskList.find(function(y){return y.t.id===taskId});if(!x)return;
  var b=x.b,t=x.t;cid=taskId;
  document.getElementById('mTitle').innerHTML='<span class="m-dot"></span>'+esc(b.customer_name);
  document.getElementById('mBody').innerHTML='<div class="spin"><div class="spin-dot"></div><div class="spin-dot"></div><div class="spin-dot"></div></div>';
  document.getElementById('mActs').innerHTML='';
  document.getElementById('modal').classList.add('show');
  var photos=[];try{var pr=await SB.from('task_photos').select('*').eq('task_id',taskId).order('created_at',{ascending:true});photos=pr.data||[];}catch(e){}
  var beforeP=photos.filter(function(p){return p.type==='before'});
  var afterP=photos.filter(function(p){return p.type==='after'});
  function thumbs(arr){if(!arr.length)return'<div style="font-size:.72rem;color:var(--text3)">None</div>';var s='<div class="adm-thumbs">';arr.forEach(function(p){s+='<a href="'+esc(p.url)+'" target="_blank" class="adm-thumb"><img src="'+esc(p.url)+'" loading="lazy"></a>'});return s+'</div>'}
  var opts='<option value="">-- Unassigned --</option>';
  staffList.forEach(function(s){opts+='<option value="'+s.id+'"'+(t.assigned_to===s.id?' selected':'')+'>'+esc(s.full_name)+' ('+esc(s.phone)+')</option>';});
  function row(k,v){return '<div class="tl-item"><span class="tk">'+k+'</span><span class="tv">'+(v||'-')+'</span></div>';}
  var tl=row('Created',fmtTs(t.created_at))+row('Started',fmtTs(t.started_at))+row('Finished',fmtTs(t.finished_at))+row('Completed',fmtTs(t.completed_at));
  var area=detectArea(b.customer_address);
  document.getElementById('mBody').innerHTML=
    '<div class="m-row"><span class="mk">Date & Time</span><span class="mv">'+fd(b.booking_date)+' &middot; '+ft(b.booking_time)+'</span></div>'+
    '<div class="m-row"><span class="mk">Status</span><span class="mv">'+taskBadge(t.status)+'</span></div>'+
    '<div class="m-row"><span class="mk">Address</span><span class="mv">'+esc(b.customer_address)+'</span></div>'+
    (area?'<div class="m-row"><span class="mk">Area</span><span class="mv"><i data-lucide="map-pin"></i> '+esc(area)+'</span></div>':'')+
    '<div class="m-row"><span class="mk">Payment</span><span class="mv">Deposit '+esc(b.payment_status)+' &middot; Balance RM'+esc(settings.price_balance||b.deposit_amount||'150')+'</span></div>'+
    '<div style="margin:14px 0 6px;font-size:.72rem;color:var(--text3);font-weight:600">Before Photos ('+beforeP.length+')</div>'+thumbs(beforeP)+
    '<div style="margin:14px 0 6px;font-size:.72rem;color:var(--text3);font-weight:600">After Photos ('+afterP.length+')</div>'+thumbs(afterP)+
    '<div style="margin:14px 0 6px;font-size:.72rem;color:var(--text3);font-weight:600">Assign Staff</div>'+
    '<select id="assignSel" class="mv-sel">'+opts+'</select>'+
    '<div class="tl">'+tl+'</div>';
  var ph=waNum(b.customer_phone);
  var a='<button class="m-btn accept" onclick="saveAssign(\''+t.id+'\')">Save Assignment</button>';
  a+='<button class="m-btn" style="background:var(--accent2);color:#fff" onclick="window.open(\''+mapsUrl(b.customer_address)+'\',\'_blank\')"><i data-lucide="map-pin"></i> Maps</button>';
  a+='<button class="m-btn" style="background:#25D366;color:#fff" onclick="waStaff(\''+t.id+'\')"><i data-lucide="message-circle"></i> WA Staff</button>';
  a+='<button class="m-btn" style="background:#25D366;color:#fff" onclick="window.open(\'https://wa.me/'+ph+'\',\'_blank\')"><i data-lucide="message-circle"></i> WA Customer</button>';
  if(t.status==='in_progress'||t.status==='awaiting_review')a+='<button class="m-btn done" style="grid-column:1/-1" onclick="completeTask(\''+t.id+'\')"><i data-lucide="check-check"></i> Complete'+(settings.auto_send_wa_balance==='true'?' &amp; Request Balance (WA)':'')+'</button>';
  a+='<button class="m-btn close" onclick="closeModal()">Close</button>';
  document.getElementById('mActs').innerHTML=a;
}
function completeTask(taskId){
  var x=taskList.find(function(y){return y.t.id===taskId});if(!x)return;
  var b=x.b;
  var autoWA=settings.auto_send_wa_balance==='true';
  var useAPI=settings.wa_api_enabled==='true';
  var cfmText=autoWA?(useAPI?'Auto-send WhatsApp via Cloud API + Generate Bayarcash link for RM'+(settings.price_balance||'150')+' balance?':'Generate Bayarcash payment link + auto-send WhatsApp for RM'+(settings.price_balance||'150')+' balance?'):'Mark this job COMPLETED? (WhatsApp will NOT be sent automatically)';
  if(!confirm(cfmText))return;
  if(autoWA){
    (async function(){
      try{
        var payRes=await fetch(BC_BALANCE_FN,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({booking_id:b.id,origin:location.origin})});
        var payData=await payRes.json();
        var payUrl=payData.url||'';
        if(useAPI){
          var waRes=await fetch(FN_WA_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({booking_id:b.id,template:'wa_tmpl_balance_link',extra:{baki:settings.price_balance||'150',business:settings.business_name||'JAYABINA'},pay_url:payUrl})});
          var waData=await waRes.json();
          if(!waRes.ok||waData.error){alert('WhatsApp API error: '+(waData.error||'failed')+'\nFalling back to manual wa.me.');window.open('https://wa.me/'+waNum(b.customer_phone)+'?text='+encodeURIComponent(payUrl),'_blank')}
        }else{
          var msg=fillTemplate(settings.wa_tmpl_balance_link||settings.wa_tmpl_baki||'Salam {nama}, kerja cuci tangki air di {alamat} telah siap. Sila lengkapkan baki RM{baki} melalui pautan: {pay_url}. Terima kasih {business}.',{
            nama:b.customer_name,alamat:b.customer_address,baki:settings.price_balance||'150',bank:settings.bank_name||'',akaun:settings.bank_account_no||'',pemegang:settings.bank_account_holder||'',qr_url:settings.qr_image_url||'',business:settings.business_name||'JAYABINA',pay_url:payUrl
          });
          window.open('https://wa.me/'+waNum(b.customer_phone)+'?text='+encodeURIComponent(msg),'_blank');
        }
      }catch(e){alert('Error: '+e.message);return;}
    })();
  }
  var now=new Date().toISOString();
  (async function(){
    try{
      var r1=await SB.from('tasks').update({status:'completed',completed_at:now,updated_at:now}).eq('id',taskId);if(r1.error)throw r1.error;
      var r2=await SB.from('bookings').update({status:'completed',updated_at:now}).eq('id',b.id);if(r2.error)throw r2.error;
      closeModal();await loadTaskData();renderCalendar();
    }catch(e){alert('Error: '+e.message);}
  })();
}
async function saveAssign(taskId){
  var sid=document.getElementById('assignSel').value||null;
  var x=taskList.find(function(y){return y.t.id===taskId});
  var upd={assigned_to:sid,updated_at:new Date().toISOString()};
  if(sid&&(!x||x.t.status==='unassigned'))upd.status='assigned';
  if(!sid)upd.status='unassigned';
  try{var {error}=await SB.from('tasks').update(upd).eq('id',taskId);if(error)throw error;closeModal();await loadTaskData();renderCalendar();}
  catch(e){alert('Error: '+e.message);}
}
function waStaff(taskId){
  var x=taskList.find(function(y){return y.t.id===taskId});if(!x)return;
  if(!x.s){alert('Assign a staff first.');return;}
  var b=x.b;
  var msg=fillTemplate(settings.wa_tmpl_staff||'Salam {nama_staff}, tugasan cuci tangki: {nama} di {alamat} pada {tarikh} ({slot}). Lokasi: {maps}',{nama_staff:x.s.full_name,nama:b.customer_name,alamat:b.customer_address,tarikh:fd(b.booking_date),slot:ft(b.booking_time),maps:mapsUrl(b.customer_address)});
  window.open('https://wa.me/'+waNum(x.s.phone)+'?text='+encodeURIComponent(msg),'_blank');
}
async function autoAssignAll(){
  if(!staffList.length){alert('No active staff to assign. Add staff first.');return;}
  if(!confirm('Auto-assign all unassigned tasks to staff now (using the current rule)?'))return;
  try{
    var r=await SB.rpc('distribute_unassigned');
    if(r.error)throw r.error;
    await loadTaskData();renderCalendar();
    alert('Assigned '+(r.data||0)+' task(s).');
  }catch(e){alert('Error: '+e.message);}
}

// AUTH (Supabase)
async function doLogin(){
  var msg=document.getElementById('authErr');
  var em=document.getElementById('loginEmail').value.trim();
  var pw=document.getElementById('loginPass').value;
  if(!em||!pw){msg.style.display='block';msg.textContent='Enter email and password';return}
  msg.style.display='none';
  try{
    var {error}=await SB.auth.signInWithPassword({email:em,password:pw});
    if(error){msg.style.display='block';msg.textContent=error.message;return}
    await checkAccess();
  }catch(e){msg.style.display='block';msg.textContent=e.message}
}
async function checkAccess(){
  try{
    var {data:{user}}=await SB.auth.getUser();
    if(!user){showLogin();return}
    var {data:profile}=await SB.from('profiles').select('role,is_active,full_name').eq('id',user.id).single();
    if(!profile||profile.role!=='admin'||!profile.is_active){await SB.auth.signOut();showLogin();return}
    document.getElementById('loginOverlay').classList.add('hidden');
    await loadSettings();
    var h=location.hash;
    if(h==='#bookings'||h==='#pending')showBookings(h==='#pending'?'pending_payment':null);
    else if(h==='#schedule')showSchedule();
    else if(h==='#staff')showStaff();
    else if(h==='#reports')showReports();
    else if(h==='#settings')showSettings();
    else showDashboard();
  }catch(e){showLogin()}
}
function showLogin(){document.getElementById('loginOverlay').classList.remove('hidden');document.getElementById('authErr').style.display='none'}
async function logout(){try{await SB.auth.signOut()}catch(e){}location.reload()}
checkAccess();relucide();
if('serviceWorker' in navigator){navigator.serviceWorker.register('/sw.js').catch(function(){})}
