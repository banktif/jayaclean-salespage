<!DOCTYPE html>
<html lang="en" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="robots" content="noindex,nofollow">
  <title>JAYACLEAN — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/theme.css">
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100dvh;display:flex;align-items:center;justify-content:center;padding:20px;-webkit-font-smoothing:antialiased}
    .box{width:340px;max-width:90vw;text-align:center}
    .avatar{width:72px;height:72px;border-radius:20px;background:linear-gradient(135deg,var(--accent),#16a34a);display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:1.6rem;font-weight:800;color:#fff;box-shadow:0 8px 24px var(--accent-glow)}
    h2{font-size:1.25rem;font-weight:700;margin-bottom:6px}
    .sub{font-size:.78rem;color:var(--text3);margin-bottom:24px}
    input{width:100%;padding:15px 18px;background:var(--elevated);border:1px solid var(--border);border-radius:14px;color:var(--text);font-family:var(--font);font-size:.9rem;margin-bottom:12px;outline:none;text-align:center;transition:all .2s}
    input:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
    .err{color:var(--danger);font-size:.72rem;margin-bottom:8px;min-height:16px}
    button{width:100%;padding:14px;background:var(--accent);color:#fff;border:none;border-radius:14px;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .2s;font-family:var(--font);box-shadow:0 4px 12px var(--accent-glow)}
    button:active{transform:scale(.97)}button:disabled{opacity:.6}
    .hint{margin-top:16px;font-size:.68rem;color:var(--text3);line-height:1.6}
  </style>
</head>
<body>
<div class="box">
  <div class="avatar">JC</div>
  <h2>JAYACLEAN</h2>
  <p class="sub">Staff & Admin Login</p>
  <input type="text" id="identifier" placeholder="Email or phone number" autocomplete="username">
  <input type="password" id="password" placeholder="Password" autocomplete="current-password">
  <p class="err" id="err"></p>
  <button id="btn" onclick="doLogin()">Sign In</button>
  <p class="hint">Staff: use your phone number.<br>Forgot password? Contact your admin.</p>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
var SB=supabase.createClient('https://thbscwlcyhcnqsppoyfn.supabase.co','sb_publishable_jFrl83f8l_tcWTulTL5lkQ_bLnCVpYR');

function toEmail(id){
  id=(id||'').trim();
  if(id.indexOf('@')>-1)return id;
  var digits=id.replace(/[^0-9]/g,'');
  return digits+'@staff.jayabina.local';
}

async function routeByRole(){
  var {data:{user}}=await SB.auth.getUser();
  if(!user)return false;
  var {data:profile}=await SB.from('profiles').select('role,is_active').eq('id',user.id).single();
  if(!profile||!profile.is_active){await SB.auth.signOut();return false;}
  location.href=profile.role==='admin'?'/admin/':'/worker/';
  return true;
}

async function doLogin(){
  var err=document.getElementById('err'),btn=document.getElementById('btn');
  err.textContent='';
  var email=toEmail(document.getElementById('identifier').value);
  var pass=document.getElementById('password').value;
  if(!email||!pass){err.textContent='Enter email/phone and password.';return;}
  btn.disabled=true;btn.textContent='Signing in...';
  try{
    var {error}=await SB.auth.signInWithPassword({email:email,password:pass});
    if(error)throw error;
    var ok=await routeByRole();
    if(!ok){err.textContent='Account inactive or not set up. Contact admin.';btn.disabled=false;btn.textContent='Sign In';}
  }catch(e){
    err.textContent='Invalid login. Check your credentials.';
    btn.disabled=false;btn.textContent='Sign In';
  }
}

document.getElementById('password').addEventListener('keydown',function(e){if(e.key==='Enter')doLogin()});

// Already signed in? route immediately
(async function(){try{await routeByRole()}catch(e){}})();
</script>
</body>
</html>
